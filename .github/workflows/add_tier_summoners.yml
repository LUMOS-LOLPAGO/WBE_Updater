name: 특정 티어 소환사 일괄 추가

on:
  workflow_dispatch:
    inputs:
      tier:
        description: '추가할 티어'
        required: true
        type: choice
        options:
          - challenger
          - grandmaster
          - master
          - DIAMOND
          - EMERALD
          - PLATINUM
          - GOLD
          - SILVER
          - BRONZE
          - IRON

env:
  TZ: Asia/Seoul

jobs:
  add-tier-summoners:
    runs-on: ubuntu-latest
    env:
      RIOT_API_KR_ROOT: ${{ secrets.RIOT_API_KR_ROOT }}
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
      SERVER_URL: ${{ secrets.SERVER_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install the project
        run: uv sync --locked --no-dev

      - name: Add summoners for ${{ inputs.tier }}
        run: uv run src/add_tier_summoners.py --tier ${{ inputs.tier }}
